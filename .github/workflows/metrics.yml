# Metrics dashboard for GitHub profile README
# Docs: https://github.com/lowlighter/metrics
# Setup: see SETUP.md

name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{{ secrets.METRICS_TOKEN }}
          user: antonprafanto
          filename: github-metrics.svg
          output_action: commit

          # Dark dashboard layout (two columns on desktop)
          config_theme: dark
          config_display: columns
          config_timezone: Asia/Makassar
          config_order: base.header, base.activity+, base.repositories, pagespeed, isocalendar, habits, languages, topics

          # Base stats (header + activity + repos)
          base: header, activity+, repositories
          base_indepth: yes

          # 3D contribution calendar + streak
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Commit habits (hour / day charts)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: classic

          # Language distribution
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_colors: github

          # Mastered technologies (topic icons)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_sort: stars
          plugin_topics_limit: 20

          # PageSpeed for Koding Indonesia
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://kodingindonesia.com
          plugin_pagespeed_detailed: no
